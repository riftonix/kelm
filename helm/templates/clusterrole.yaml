{{- if .Values.zarf.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "kelm"
rules:
  # Namespace lifecycle management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces/finalize"]
    verbs: ["update"]

  # Zarf state secrets and Helm 3 release secrets (stored as k8s secrets)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Tunnel to Zarf internal registry (ConnectToZarfRegistryEndpoint)
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]

  # Core resources deployed by Helm charts in Zarf packages
  - apiGroups: [""]
    resources:
      - "configmaps"
      - "endpoints"
      - "persistentvolumeclaims"
      - "pods"
      - "serviceaccounts"
      - "services"
    verbs: ["get", "list", "watch", "delete", "update", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "delete", "update", "patch"]

  # Workloads
  - apiGroups: ["apps"]
    resources:
      - "deployments"
      - "statefulsets"
      - "daemonsets"
      - "replicasets"
    verbs: ["get", "list", "watch", "delete", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "delete", "update", "patch"]

  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies", "ingressclasses"]
    verbs: ["get", "list", "watch", "delete", "update", "patch"]

  # RBAC resources (Helm charts often deploy these)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - "roles"
      - "rolebindings"
      - "clusterroles"
      - "clusterrolebindings"
    verbs: ["get", "list", "watch", "delete", "update", "patch"]

  # Autoscaling and policy
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "delete", "update", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "delete", "update", "patch"]

  # CRDs (Zarf packages may deploy CRDs)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "delete", "update", "patch"]

  # Custom resources installed by Zarf packages.
  # If your packages deploy CRs not covered above, add their apiGroups here.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "delete"]
{{- end }}
